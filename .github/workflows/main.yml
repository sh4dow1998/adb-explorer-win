name: Build Windows EXE

on: [push, workflow_dispatch] # Se ejecuta al subir cambios o manualmente

jobs:
  build:
    runs-on: windows-latest # Usa un entorno de Windows

    steps:
    - uses: actions/checkout@v4 # Descarga tu código

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Usa Python 3.10

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        # Asumiendo que tu archivo principal es adb_explorer_pro.py
        pyinstaller --onefile --noconsole adb_explorer_pro.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ADB_File_Manager_Windows
        path: dist/*.exe # Sube el .exe generado
